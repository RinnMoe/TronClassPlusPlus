<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="icon128.png" />
    <link rel="stylesheet" href="style.css" />
    <script async src="https://busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
    <title>TronClass++</title>
  </head>

  <body>
    <main class="app-shell">
      <section class="hero" aria-labelledby="page-title">
        <div class="hero-copy">
          <p class="product">TronClass功能增强插件</p>
          <h1 id="page-title" class="brand-title">TronClass++</h1>
          <p class="lead">对畅课功能进行加强，支持仅预览文件下载、批量下载和视频播放辅助。适用于 Chromium 系浏览器与 Safari。</p>
          <div class="actions">
            <a class="btn primary" href="https://download.rinn.moe/tcpp/TronclassPP_v2.0.0.zip" target="_blank" rel="noreferrer">下载</a>
            <a class="btn ghost" href="https://www.doubao.com/thread/w673a6ddbec450a73" target="_blank" rel="noreferrer">安装教程</a>
            <a class="btn ghost" href="https://github.com/RinnMoe/TronClassPlusPlus" target="_blank" rel="noreferrer">GitHub</a>
          </div>
          <div class="visit-counter" aria-label="访问统计">
            <span id="busuanzi_container_site_pv">访问量 <strong id="busuanzi_value_site_pv">--</strong></span>
          </div>
        </div>

        <div class="preview extension-preview" aria-label="TronClass++ 弹窗预览">
          <input class="preview-tab-state" type="radio" name="preview-tab" id="preview-tab-downloads" checked />
          <input class="preview-tab-state" type="radio" name="preview-tab" id="preview-tab-video" />
          <div class="popup-head">
            <div class="popup-brand">
              <strong>TronClass++</strong>
              <button class="popup-version" type="button">v2.0.0</button>
            </div>
            <div class="popup-icons" aria-hidden="true">
              <span>
                <svg viewBox="0 0 24 24">
                  <path d="M12 .5C5.65.5.5 5.66.5 12.02c0 5.09 3.29 9.4 7.86 10.92.58.11.79-.25.79-.56v-2.17c-3.2.7-3.88-1.37-3.88-1.37-.52-1.34-1.28-1.69-1.28-1.69-1.05-.72.08-.7.08-.7 1.16.08 1.78 1.2 1.78 1.2 1.03 1.78 2.7 1.26 3.36.96.1-.76.4-1.26.73-1.56-2.55-.29-5.23-1.29-5.23-5.72 0-1.26.44-2.28 1.17-3.09-.12-.29-.51-1.46.11-3.04 0 0 .96-.31 3.14 1.18a10.8 10.8 0 0 1 5.72 0c2.18-1.49 3.14-1.18 3.14-1.18.62 1.58.23 2.75.11 3.04.73.81 1.17 1.83 1.17 3.09 0 4.44-2.69 5.43-5.25 5.71.41.36.78 1.07.78 2.16v3.2c0 .31.21.68.8.56a11.53 11.53 0 0 0 7.85-10.92C23.5 5.66 18.35.5 12 .5Z" />
                </svg>
              </span>
            </div>
          </div>
          <div class="mode-tabs" aria-label="弹窗预览功能分类">
            <label class="mode-tab" for="preview-tab-downloads">课件下载</label>
            <label class="mode-tab" for="preview-tab-video">视频播放</label>
          </div>
          <div class="popup-views">
            <div class="popup-view" data-preview-view="downloads">
              <div class="status success">检测到 3 个文件</div>
              <div class="popup-list">
                <div class="file-item">
                  <div class="file-info">
                    <div class="file-name">Lecture 01.pdf</div>
                    <div class="file-size">2.80 MB</div>
                  </div>
                  <button class="primary" type="button">下载</button>
                </div>
                <div class="file-item">
                  <div class="file-info">
                    <div class="file-name">Preview only.docx</div>
                    <div class="file-size">640 KB</div>
                  </div>
                  <button class="primary" type="button">下载</button>
                </div>
                <div class="file-item">
                  <div class="file-info">
                    <div class="file-name">Course slides.pptx</div>
                    <div class="file-size">4.10 MB</div>
                  </div>
                  <button class="primary" type="button">下载</button>
                </div>
              </div>
            </div>
            <div class="popup-view" data-preview-view="video">
              <div class="status success">检测到 1 个视频</div>
              <div class="popup-video-panel">
                <div class="setting-row">
                  <div>
                    <strong>自动播放视频</strong>
                    <span>已开启</span>
                  </div>
                  <label class="switch" aria-label="自动播放视频">
                    <input type="checkbox" checked />
                    <span></span>
                  </label>
                </div>
                <div class="setting-row">
                  <div>
                    <strong>播放完成后跳转下一项</strong>
                    <span>已关闭</span>
                  </div>
                  <label class="switch" aria-label="播放完成后跳转下一项">
                    <input type="checkbox" />
                    <span></span>
                  </label>
                </div>
                <button class="btn btn-secondary" type="button">刷新状态</button>
              </div>
            </div>
          </div>
          <div class="popup-footer" data-preview-footer>
            <button class="btn btn-primary" type="button">下载全部</button>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
